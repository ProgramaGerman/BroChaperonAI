<!doctype html>
<html lang="es">
  <head>
    <!-- =====================================================
         Meta y configuración
         ===================================================== -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="TaskFlow — Gestiona tus tareas y papeletas de forma rápida, simple y elegante."
    />
    <meta name="theme-color" content="#7c3aed" />

    <title>TaskFlow — Gestor de Tareas</title>

    <!-- =====================================================
         Google Fonts
         ===================================================== -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- =====================================================
         Estilos
         ===================================================== -->
    <link rel="stylesheet" href="css/styles.css" />
  </head>

  <body>
    <!-- =====================================================
         Contenedor raíz
         ===================================================== -->
    <div class="app-wrapper" id="app">
      <!-- =================================================
           Navbar
           ================================================= -->
      <header class="navbar" role="banner">
        <div class="navbar__brand">
          <span class="navbar__brand-icon" aria-hidden="true">📋</span>
          <span class="navbar__brand-text">TaskFlow</span>
        </div>

        <button
          class="btn btn--primary"
          id="btn-new-task"
          type="button"
          aria-label="Crear nueva tarea"
        >
          ＋ Nueva Tarea
        </button>
      </header>

      <!-- =================================================
           Barra de estadísticas
           ================================================= -->
      <section class="stats-bar" aria-label="Estadísticas de tareas">
        <div class="stats-bar__inner">
          <div class="stat-item">
            <span class="stat-item__value" id="stat-total">0</span>
            <span class="stat-item__label">Total</span>
          </div>

          <div class="stat-item">
            <span
              class="stat-item__value"
              id="stat-pending"
              style="color: var(--clr-warning)"
              >0</span
            >
            <span class="stat-item__label">Pendientes</span>
          </div>

          <div class="stat-item">
            <span
              class="stat-item__value"
              id="stat-completed"
              style="color: var(--clr-success)"
              >0</span
            >
            <span class="stat-item__label">Completadas</span>
          </div>
        </div>
      </section>

      <!-- =================================================
           Contenido principal
           ================================================= -->
      <main class="main" id="main-content">
        <div class="main__inner">
          <!-- Toolbar: búsqueda + filtros -->
          <div
            class="main__toolbar"
            role="toolbar"
            aria-label="Herramientas de filtrado"
          >
            <input
              aria-label="Buscar tareas"
              class="search-input"
              id="search-input"
              placeholder="🔍  Buscar tarea…"
              type="search"
            />

            <nav class="filters" aria-label="Filtros de estado">
              <button
                class="filter-btn filter-btn--active"
                data-filter="all"
                type="button"
              >
                Todas
              </button>

              <button class="filter-btn" data-filter="pending" type="button">
                ⏳ Pendientes
              </button>

              <button class="filter-btn" data-filter="completed" type="button">
                ✅ Completadas
              </button>
            </nav>
          </div>

          <!-- Cuadrícula de tareas -->
          <section
            aria-label="Lista de tareas"
            aria-live="polite"
            class="tasks-grid"
            id="tasks-grid"
          >
            <!-- Las tarjetas se renderizan dinámicamente desde app.js -->
          </section>
        </div>
      </main>
    </div>
    <!-- /#app -->

    <!-- =======================================================
         Modal overlay
         ======================================================= -->
    <div class="modal-overlay" id="modal-overlay" role="presentation">
      <div id="modal-content">
        <!-- El contenido del modal se inyecta desde components.js -->
      </div>
    </div>

    <!-- =======================================================
         Toast / notificaciones
         ======================================================= -->
    <div
      aria-live="assertive"
      class="toast-container"
      id="toast-container"
      role="region"
    ></div>

    <!-- =======================================================
         Scripts (módulos ES6)
         ======================================================= -->
    <script type="module" src="js/app.js"></script>
  </body>
</html>
